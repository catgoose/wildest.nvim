name: GIFs

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  showdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: rhysd/action-setup-vim@19e3dd31a84dbc2c5445d65e9b363f616cab96c1
        with:
          neovim: true
          version: nightly

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-deps
        with:
          path: deps
          key: media-deps-${{ hashFiles('Makefile', 'csrc/**') }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-csrc
        with:
          path: csrc
          key: media-csrc-${{ hashFiles('csrc/**') }}

      - uses: ./.github/actions/setup-vhs
        with:
          skip-build: ${{ steps.cache-csrc.outputs.cache-hit == 'true' }}
          skip-deps: ${{ steps.cache-deps.outputs.cache-hit == 'true' }}

      - name: Generate showdown GIF
        run: nvim --headless -l scripts/screenshots/generate.lua --showdown

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: showdown
          path: |
            scripts/screenshots/output/showdown.gif
            scripts/screenshots/output/showdown_scenes.json

  gunsmoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: rhysd/action-setup-vim@19e3dd31a84dbc2c5445d65e9b363f616cab96c1
        with:
          neovim: true
          version: nightly

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-deps
        with:
          path: deps
          key: media-deps-${{ hashFiles('Makefile', 'csrc/**') }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-csrc
        with:
          path: csrc
          key: media-csrc-${{ hashFiles('csrc/**') }}

      - uses: ./.github/actions/setup-vhs
        with:
          skip-build: ${{ steps.cache-csrc.outputs.cache-hit == 'true' }}
          skip-deps: ${{ steps.cache-deps.outputs.cache-hit == 'true' }}

      - name: Generate gunsmoke GIF
        run: nvim --headless -l scripts/screenshots/generate.lua --gunsmoke

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gunsmoke
          path: |
            scripts/screenshots/output/gunsmoke.gif
            scripts/screenshots/output/gunsmoke_scenes.json

  publish:
    runs-on: ubuntu-latest
    needs: [showdown, gunsmoke]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: showdown
          path: output

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: gunsmoke
          path: output

      - name: Checkout screenshots repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: catgoose/screenshots
          token: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
          path: screenshots-repo

      - name: Copy GIFs into screenshots repo
        run: |
          mkdir -p screenshots-repo/wildest.nvim/showcase
          cp output/*.gif output/*.json screenshots-repo/wildest.nvim/showcase/

      - name: Create PR with GIFs
        run: |
          cd screenshots-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wildest.nvim
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          branch="wildest-nvim/gifs-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git commit -m "Update wildest.nvim GIFs"
          git push origin "$branch"
          pr_url=$(gh pr create --repo catgoose/screenshots --base main --head "$branch" \
            --title "Update wildest.nvim GIFs" --body "Auto-generated from wildest.nvim CI.")
          gh pr merge "$pr_url" --repo catgoose/screenshots --squash --admin
        env:
          GH_TOKEN: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
