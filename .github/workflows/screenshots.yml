name: Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: false
      matrix:
        category:
          - renderers
          - themes
          - features
          - pipelines
          - highlights
          - borders
          - wildmenu-variants
          - palette-variants
          - dimensions
          - gradients
          - combinations
          - layouts
          - options
          - previews
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: rhysd/action-setup-vim@19e3dd31a84dbc2c5445d65e9b363f616cab96c1
        with:
          neovim: true
          version: nightly

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-deps
        with:
          path: deps
          key: media-deps-${{ hashFiles('Makefile', 'csrc/**') }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-csrc
        with:
          path: csrc
          key: media-csrc-${{ hashFiles('csrc/**') }}

      - uses: ./.github/actions/setup-vhs
        with:
          skip-build: ${{ steps.cache-csrc.outputs.cache-hit == 'true' }}
          skip-deps: ${{ steps.cache-deps.outputs.cache-hit == 'true' }}

      - name: Generate ${{ matrix.category }} screenshots
        run: nvim --headless -l scripts/screenshots/generate.lua --${{ matrix.category }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: screenshots-${{ matrix.category }}
          path: scripts/screenshots/output/*.png

  publish:
    runs-on: ubuntu-latest
    needs: [screenshots]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: screenshots-*
          path: output
          merge-multiple: true

      - name: Checkout screenshots repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: catgoose/screenshots
          token: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
          path: screenshots-repo

      - name: Copy and push screenshots
        run: |
          mkdir -p screenshots-repo/wildest.nvim/wanted_posters
          cp output/*.png screenshots-repo/wildest.nvim/wanted_posters/
          cd screenshots-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wildest.nvim
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update wildest.nvim screenshots"
          git pull --rebase origin main
          git push
        env:
          GH_TOKEN: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
