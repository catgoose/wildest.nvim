name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: JohnnyMorganz/stylua-action@479972f01e665acfcba96ada452c36608bdbbb5e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: false

      - name: Format
        run: make format

      - name: Create PR for formatting
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "style: auto-format with StyLua"
          title: "style: auto-format with StyLua"
          body: "Auto-formatted Lua files with StyLua."
          branch: style/auto-format
          add-paths: |
            lua/
            plugin/
          delete-branch: true

      - name: Auto-approve format PR
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.APPROVE_PAT }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.cpr.outputs.pull-request-number }},
              event: 'APPROVE',
              body: 'Auto-approved: StyLua formatting'
            })

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge --auto --squash --delete-branch ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        nvim-version: [v0.10.2, nightly]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: rhysd/action-setup-vim@19e3dd31a84dbc2c5445d65e9b363f616cab96c1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-deps
        with:
          path: deps
          key: deps-${{ hashFiles('Makefile', 'csrc/**') }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-csrc
        with:
          path: |
            csrc
            lua/wildest/fuzzy.so
          key: csrc-${{ hashFiles('csrc/**') }}

      - name: Clone mini.nvim
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          mkdir -p deps
          git clone --depth 1 https://github.com/echasnovski/mini.nvim deps/mini.nvim

      - name: Build C library
        if: steps.cache-csrc.outputs.cache-hit != 'true'
        run: make build

      - name: Run tests
        run: make test
