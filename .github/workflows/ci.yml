name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  format-and-open-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: JohnnyMorganz/stylua-action@479972f01e665acfcba96ada452c36608bdbbb5e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: false

      - name: Format
        run: make format

      - name: Open format PR if needed
        id: format-pr
        run: |
          if ! git diff --quiet lua plugin; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            branch="format/stylua-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$branch"
            git add lua plugin
            git commit -m "stylua format"
            git push origin "$branch"
            gh pr create --base main --head "$branch" --title "stylua format" --body "Auto-generated format PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (startsWith(github.head_ref, 'format/') || github.head_ref == 'stylua-format')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: JohnnyMorganz/stylua-action@479972f01e665acfcba96ada452c36608bdbbb5e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: false

      - name: Lint
        run: make lint

  merge-or-report:
    runs-on: ubuntu-latest
    needs: lint
    if: always() && github.event_name == 'pull_request' && (startsWith(github.head_ref, 'format/') || github.head_ref == 'stylua-format')
    steps:
      - name: Merge format PR
        if: needs.lint.result == 'success'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on lint failure
        if: needs.lint.result == 'failure'
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Format PR #${{ github.event.pull_request.number }} failed lint" \
            --body "The auto-generated format PR #${{ github.event.pull_request.number }} failed lint checks. Manual intervention required."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'format/') && github.head_ref != 'stylua-format'
    strategy:
      fail-fast: false
      matrix:
        nvim-version: [v0.10.2, nightly]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: rhysd/action-setup-vim@19e3dd31a84dbc2c5445d65e9b363f616cab96c1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-deps
        with:
          path: deps
          key: deps-${{ hashFiles('Makefile', 'csrc/**') }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-csrc
        with:
          path: |
            csrc
            lua/wildest/fuzzy.so
          key: csrc-${{ hashFiles('csrc/**') }}

      - name: Clone mini.nvim
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          mkdir -p deps
          git clone --depth 1 https://github.com/echasnovski/mini.nvim deps/mini.nvim

      - name: Build C library
        if: steps.cache-csrc.outputs.cache-hit != 'true'
        run: make build

      - name: Run tests
        run: make test
