name: README

on:
  push:
    branches: [main]
    paths:
      - "scripts/screenshots/configs.lua"
      - "scripts/readme/**"
      - "lua/wildest/themes/**"
      - "lua/wildest/renderer/init.lua"
  pull_request:
    branches: [main]
    paths:
      - "scripts/screenshots/configs.lua"
      - "scripts/readme/**"
      - "lua/wildest/themes/**"
      - "lua/wildest/renderer/init.lua"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Lua
        run: sudo apt-get install -y lua5.4
      - name: Generate README
        run: lua5.4 scripts/readme/gen_readme.lua
      - name: Create Pull Request
        id: cpr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: docs/auto-readme
          add-paths: |
            README.md
            SCREENSHOTS.md
          commit-message: "docs: auto-generate README and SCREENSHOTS [skip ci]"
          title: "docs: auto-generate README and SCREENSHOTS"
          body: "Auto-generated by README workflow."
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
