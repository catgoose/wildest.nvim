name: README

on:
  push:
    branches: [main]
    paths:
      - "scripts/screenshots/configs.lua"
      - "scripts/readme/**"
      - "lua/wildest/themes/**"
      - "lua/wildest/renderer/init.lua"
  pull_request:
    branches: [main]
    paths:
      - "scripts/screenshots/configs.lua"
      - "scripts/readme/**"
      - "lua/wildest/themes/**"
      - "lua/wildest/renderer/init.lua"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  readme:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.CI_PAT }}
      - name: Install Lua
        run: sudo apt-get install -y lua5.4
      - name: Generate README
        run: lua5.4 scripts/readme/gen_readme.lua
      - name: Commit and push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md WANTED_POSTERS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-generate README and WANTED_POSTERS"
          git pull --rebase origin main
          git push
